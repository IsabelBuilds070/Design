<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fashionable</title>
  <link rel="stylesheet" href="../design/fontawesome-free-7.1.0-web/css/all.css">
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Georgia", serif;
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  padding: 10px 80px;
  font-size: 13px;
  background: #f4f4f4;
}

.top-socials i {
  margin-right: 12px;
  cursor: pointer;
}

.top-links a {
  margin-left: 15px;
  text-decoration: none;
  color: #000;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 80px;
  background: #eef1f4;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: bold;
}

.header nav a {
  margin-right: 25px;
  text-decoration: none;
  color: #000;
  font-size: 14px;
}

.cart {
  cursor: pointer;
}

/* HERO */
.hero {
  background: #eef1f4;
  padding: 60px 80px;
}

.hero-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* HERO TEXT */
.hero-text {
  max-width: 500px;
}

.hero-text .small {
  font-size: 13px;
  color: #777;
  margin-bottom: 10px;
}

.hero-text h1 {
  font-size: 64px;
  line-height: 1.1;
  margin-bottom: 25px;
}

.hero-text button {
  padding: 14px 30px;
  border: none;
  background: #000;
  color: #fff;
  border-radius: 30px;
  cursor: pointer;
}

/* HERO IMAGE */
.hero-image img {
  width: 450px;
  max-width: 100%;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

.hot-deals {
  padding: 60px 80px;
  text-align: center;
}

.hot-deals h2 {
  font-size: 32px;
  margin-bottom: 40px;
}

.deals-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

.deal-card {
  background: #f5f5f5;
  padding: 20px;
  border-radius: 10px;
}

.deal-card img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 10px;
}

.deal-card h3 {
  margin: 20px 0;
  font-size: 18px;
}

.deal-card button {
  background: black;
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 14px;
}

.deal-card button:hover {
  background: #333;
}
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-socials">
      <i class="fab fa-facebook-f"></i>
      <i class="fab fa-twitter"></i>
      <i class="fab fa-pinterest-p"></i>
      <i class="fab fa-instagram"></i>
    </div>

    <div class="top-links">
      <a href="#">Log in</a>
      <a href="#">Register Account</a>
    </div>
  </div>

  <!-- HEADER / NAV -->
  <header class="header">
    <div class="logo">
      <i class="fa-solid fa-cart-shopping"></i>
      <span>FASHIONABLE</span>
    </div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">About Us</a>
      <a href="#">Blog</a>
      <a href="#">Contact</a>
      <i class="fa-solid fa-cart-shopping cart"></i>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-content">

      <div class="hero-text">
        <p class="small">Unique collections for everyone</p>
        <h1>FASHION<br>COLLECTION</h1>
        <button>SHOP COLLECTION</button>
      </div>

      <div class="hero-image">
        <img src="../Design/media/model.jpg" alt="Fashion Model">
      </div>

    </div>
  </section>

  <section class="hot-deals">
    <h2>Hot Deals</h2>

    <div class="deals-container">
      <div class="deal-card">
        <img src="../Design/media/model2.jpg" alt="Hot Deal Model">
        <h3>Blazzer collections</h3>
        <button>SHOP NOW</button>
      </div>

      <div class="deal-card">
        <img src="../Design/media/model3.jpg" alt="Hot Deal Model">
        <h3>Summer Collection</h3>
        <button>SHOP NOW</button>
    </div>

      <div class="deal-card">
        <img src="../Design/media/model4.jpg" alt="Hot Deal Model">
        <h3>Winter Collection</h3>
        <button>SHOP NOW</button>
      </div>
    </div>
  </section>

</body>
</html>
